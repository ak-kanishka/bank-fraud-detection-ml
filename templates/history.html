<!DOCTYPE html>
<html>

<head>
    <title>Prediction History</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<h1>Prediction History</h1>

{% for row in predictions %}

<div class="card">

    <p>
        Amount:
        {{ row[1] }}
    </p>

    <p>
        Device Risk:
        {{ row[2] }}
    </p>

    <p>
        IP Risk:
        {{ row[3] }}
    </p>

    <p>
        Result:
        {{ row[4] }}
    </p>

</div>

{% endfor %}

<a href="/">Back</a>

</body>
</html>
